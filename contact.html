<!-- 页面标题 -->
<section class="bg-black text-white py-20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <h1 class="text-5xl md:text-6xl font-bold mb-6">Contact Us</h1>
        <p class="text-xl text-gray-300">Get in touch with our team to discuss your needs.</p>
    </div>
</section>

<!-- 联系表单 + 信息 -->
<section class="py-20 bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
            <!-- 联系表单 -->
            <div>
                <h2 class="text-3xl font-bold mb-8">Send Us a Message</h2>
                <form action="https://formspree.io/f/your-form-id" method="POST" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Full Name *</label>
                        <input type="text" name="name" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email Address *</label>
                        <input type="email" name="email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Company</label>
                        <input type="text" name="company" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Message *</label>
                        <textarea name="message" rows="5" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 text-white px-8 py-4 rounded-lg font-semibold hover:bg-blue-700 transition shadow-lg">
                        Send Message
                    </button>
                </form>
            </div>
            
            <!-- 联系信息 + 地图 -->
            <div>
                <div class="bg-gray-50 p-8 rounded-2xl mb-8">
                    <h2 class="text-3xl font-bold mb-8">Contact Information</h2>
                    <div class="space-y-6">
                        <div class="flex items-start">
                            <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 mr-4">
                                <i class="fas fa-envelope"></i>
                            </div>
                            <div>
                                <p class="font-semibold">Email</p>
                                <a href="mailto:support@gyzylkum.com" class="text-gray-600 hover:text-blue-600">support@gyzylkum.com</a>
                            </div>
                        </div>
                        <div class="flex items-start">
                            <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 mr-4">
                                <i class="fas fa-phone"></i>
                            </div>
                            <div>
                                <p class="font-semibold">Phone</p>
                                <a href="tel:+12134767244" class="text-gray-600 hover:text-blue-600">+1 (213) 476-7244</a>
                            </div>
                        </div>
                        <div class="flex items-start">
                            <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 mr-4">
                                <i class="fas fa-map-marker-alt"></i>
                            </div>
                            <div>
                                <p class="font-semibold">Office</p>
                                <p class="text-gray-600">1312 17TH ST UNIT NUM 2588<br>Denver, CO 80202, USA</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Google Map -->
                <div class="h-64 w-full rounded-2xl overflow-hidden shadow-lg">
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3068.9124374817687!2d-104.9907!3d39.7374!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x876c78c4d9e9b9b9%3A0x8c9e9b9b9b9b9b9b!2sDenver%2C%20CO!5e0!3m2!1sen!2sus!4v1234567890" 
                        width="100%" 
                        height="100%" 
                        style="border:0;" 
                        allowfullscreen="" 
                        loading="lazy">
                    </iframe>
                </div>
            </div>
        </div>
    </div>
</section>
